<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>용인 플랫폼시티 (1공구)</title>
    <style>
      html { font-size: 16px; }
      @media (min-width: 2560px) { html { font-size: 21.33px; } }
      @media (min-width: 3840px) { html { font-size: 32px; } }
      body { margin: 0; }

      .app-skeleton {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: linear-gradient(180deg, #D4D6D7 0%, #EFF1F8 45%);
      }
      /* Header */
      .app-skeleton-header {
        height: 3.75rem;
        display: flex;
        align-items: center;
        padding: 0 1.25rem;
      }
      .app-skeleton-header-left { flex: 1; }
      .app-skeleton-header-left-block {
        width: 9.375rem;
        height: 2.25rem;
        background: #dde0ea;
        border-radius: 0.25rem;
      }
      .app-skeleton-header-center {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      .app-skeleton-header-logo {
        width: 6.25rem;
        height: 1.9375rem;
        background: #dde0ea;
        border-radius: 0.25rem;
      }
      .app-skeleton-header-title {
        width: 20rem;
        height: 1.875rem;
        background: #dde0ea;
        border-radius: 0.25rem;
      }
      .app-skeleton-header-right {
        flex: 1;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 0.625rem;
      }
      .app-skeleton-header-date {
        width: 11rem;
        height: 1rem;
        background: #dde0ea;
        border-radius: 0.25rem;
      }
      .app-skeleton-header-nav {
        width: 6rem;
        height: 2.5rem;
        background: #dde0ea;
        border-radius: 0.625rem;
      }
      .app-skeleton-header-btn {
        width: 2.5rem;
        height: 2.5rem;
        background: #dde0ea;
        border-radius: 0.9375rem;
      }
      /* Body: 3-column layout */
      .app-skeleton-body {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: 20rem 1fr 20rem;
        gap: 1.25rem;
        padding: 1.25rem 1.25rem 0.9375rem;
      }
      .app-skeleton-side {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 1.25rem;
      }
      .app-skeleton-card {
        height: 18.75rem;
        background: white;
        border-radius: 0.9375rem;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        animation: skeleton-pulse 1.8s ease-in-out infinite;
      }
      /* Footer */
      .app-skeleton-footer {
        height: 2.8125rem;
        background: #54565a;
      }
      @keyframes skeleton-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-skeleton">
        <div class="app-skeleton-header">
          <div class="app-skeleton-header-left">
            <div class="app-skeleton-header-left-block"></div>
          </div>
          <div class="app-skeleton-header-center">
            <div class="app-skeleton-header-logo"></div>
            <div class="app-skeleton-header-title"></div>
          </div>
          <div class="app-skeleton-header-right">
            <div class="app-skeleton-header-date"></div>
            <div class="app-skeleton-header-nav"></div>
            <div class="app-skeleton-header-btn"></div>
          </div>
        </div>
        <div class="app-skeleton-body">
          <div class="app-skeleton-side">
            <div class="app-skeleton-card" style="animation-delay: 0.1s"></div>
            <div class="app-skeleton-card" style="animation-delay: 0.2s"></div>
            <div class="app-skeleton-card" style="animation-delay: 0.3s"></div>
          </div>
          <div class="app-skeleton-card" style="height: auto; animation-delay: 0.15s; border-radius: 0.9375rem"></div>
          <div class="app-skeleton-side">
            <div class="app-skeleton-card" style="animation-delay: 0.2s"></div>
            <div class="app-skeleton-card" style="animation-delay: 0.3s"></div>
            <div class="app-skeleton-card" style="animation-delay: 0.4s"></div>
          </div>
        </div>
        <div class="app-skeleton-footer"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
